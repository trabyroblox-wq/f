<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clooud | Credits</title>

<link rel="stylesheet" href="index.css" />

<style>
/* Center layout */
.center {
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	position: relative;
	z-index: 1;
}

/* Credit card */
.credit-card {
	background: rgba(255,255,255,0.4);
	backdrop-filter: blur(15px);
	padding: 40px;
	border-radius: 25px;
	text-align: center;
	box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* Profile image */
.credit-card img {
	width: 120px;
	height: 120px;
	border-radius: 50%;
	object-fit: cover;
	margin-bottom: 15px;
	border: 3px solid rgba(0,0,0,0.1);
}

/* Name */
.credit-card h2 {
	margin: 0;
	font-weight: bold;
	color: #111827;
}

/* Back button */
.back {
	position: absolute;
	top: 20px;
	left: 20px;
	background: white;
	padding: 10px 15px;
	border-radius: 10px;
	text-decoration: none;
	color: #111;
	box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<a class="back" href="index.html">← Back</a>

<div class="center">
	<div class="credit-card">
		<img src="sbstan.png" alt="sbstan">
		<h2>sbstan</h2>
	</div>
</div>

</body>
</html>
